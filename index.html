<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>CV Luca Turretti</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-top">
            <div>
                <h1>Luca Turretti</h1>
                <p>Full Stack Software Developer</p>
            </div>
            <div class="theme-control">
                <input id="theme-toggle" class="toggle" type="checkbox" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
                <div class="curtain" aria-hidden="true"></div>
            </div>
        </div>
    </header>
    <section class="dettagli">
        <h2>Dettagli</h2>
        <ul id="details-list"></ul>
    </section>
    <section class="esperienza">
        <h2>Esperienza Lavorativa</h2>
        <div id="experience-list"></div>
    </section>

    <section class="competenze">
        <h2>Competenze</h2>
        <div id="skills-list"></div>
    </section>

    <script src="skills.js"></script>
</body>
</html>
